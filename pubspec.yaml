name: dentlink
description: "DentLink — Diş Hekimleri İçin Sosyal Platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend (Faz 3'te aktif kullanılacak, şimdilik kurulu)
  supabase_flutter: ^2.9.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI Utilities
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  # Lokalizasyon
  generate: true
